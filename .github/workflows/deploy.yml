name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Build + Test + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Brand naming lock audit
        run: ./tools/audit-brand-naming-lock.sh

      - name: Accessibility audit
        run: ./tools/audit-accessibility.sh

      - name: Clone contamination audit
        run: ./tools/audit-clone-contamination.sh

      - name: Language boundary audit
        run: ./tools/audit-language-boundary.sh

      - name: Email language audit
        run: npx tsx tools/audit-email-language.ts

      - name: Hreflang audit
        run: npx tsx tools/audit-hreflang.ts

      - name: I18n keys audit
        run: npx tsx tools/audit-i18n-keys.ts

      - name: Language switcher audit
        run: npx tsx tools/audit-language-switcher.ts

      - name: Public claims audit
        run: npx tsx tools/audit-public-claims.ts

      - name: SEO bilingual audit
        run: npx tsx tools/audit-seo-bilingual.ts

      - name: Form language audit
        run: npx tsx tools/audit-form-language.ts

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

      - name: Upload edu dist
        uses: actions/upload-artifact@v4
        with:
          name: edu-dist
          path: apps/edu/dist/
          retention-days: 1

      - name: Upload console dist
        uses: actions/upload-artifact@v4
        with:
          name: console-dist
          path: apps/console/dist/
          retention-days: 1

      - name: Upload invest dist
        uses: actions/upload-artifact@v4
        with:
          name: invest-dist
          path: apps/invest/dist/
          retention-days: 1

  deploy-web:
    name: Deploy Web to Cloudflare Pages
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=nai-web

  deploy-edu:
    name: Deploy Edu to Cloudflare Pages
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: edu-dist
          path: apps/edu/dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/edu
          command: pages deploy dist --project-name=nai-edu

  deploy-console:
    name: Deploy Console to Cloudflare Pages
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: console-dist
          path: apps/console/dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/console
          command: pages deploy dist --project-name=nai-console

  deploy-invest:
    name: Deploy Invest to Cloudflare Pages
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: invest-dist
          path: apps/invest/dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/invest
          command: pages deploy dist --project-name=nai-invest

  deploy-api:
    name: Deploy API Worker
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @nai/api build

      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy
          secrets: |
            STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET
            VNPAY_TMN_CODE
            VNPAY_HASH_SECRET
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          VNPAY_TMN_CODE: ${{ secrets.VNPAY_TMN_CODE }}
          VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}

  deploy-auth:
    name: Deploy Auth Worker
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Auth
        run: pnpm --filter @nai/auth-worker build

      - name: Deploy Auth Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/auth
          command: deploy
          secrets: |
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/auth
          command: deploy
          secrets: |
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
