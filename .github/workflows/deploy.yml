name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: 'Deploy verified artifacts to the locked production account'
        required: true
        default: false
        type: boolean

jobs:
  verify:
    name: Build + Test + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Brand naming lock audit
        run: ./tools/audit-brand-naming-lock.sh

      - name: Brand UI tokens audit (BRAND_SYNC_COMMIT_STANDARD)
        run: npx tsx tools/audit-ui-tokens.ts

      - name: Accessibility audit
        run: ./tools/audit-accessibility.sh

      - name: Clone contamination audit
        run: ./tools/audit-clone-contamination.sh

      - name: Language boundary audit
        run: ./tools/audit-language-boundary.sh

      - name: Email language audit
        run: npx tsx tools/audit-email-language.ts

      - name: Hreflang audit
        run: npx tsx tools/audit-hreflang.ts

      - name: I18n keys audit
        run: npx tsx tools/audit-i18n-keys.ts

      - name: Language switcher audit
        run: npx tsx tools/audit-language-switcher.ts

      - name: Public claims audit
        run: npx tsx tools/audit-public-claims.ts

      - name: SEO bilingual audit
        run: npx tsx tools/audit-seo-bilingual.ts

      - name: Form language audit
        run: npx tsx tools/audit-form-language.ts

      - name: Independence audit
        run: bash tools/audit-independence.sh

      - name: Secret governance audit
        run: node tools/audit-secret-governance.mjs

      - name: AI provider single-source audit
        run: node tools/audit-ai-provider-source.mjs

      - name: Production durability audit
        run: node tools/audit-production-durability.mjs

      - name: Security P0 audit
        run: npx tsx tools/audit-security-p0.ts

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: SEO build audit (rendered HTML)
        run: npx tsx tools/audit-seo-build.ts

      - name: Vietnamese purity build audit
        run: npx tsx tools/audit-vietnamese-purity-build.ts

      - name: Test
        run: pnpm test

      - name: Generate self-upgrade report
        if: always()
        run: bash tools/self-upgrade-report.sh

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report
          path: |
            QA_LOOP_LOG.md
            CHANGELOG.md
            docs/governance/SELF_UPGRADE_REPORT_*.md
            docs/governance/SELF_UPGRADE_HISTORY.md
          retention-days: 30

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

      - name: Upload edu dist
        uses: actions/upload-artifact@v4
        with:
          name: edu-dist
          path: apps/edu/dist/
          retention-days: 1

      - name: Upload console dist
        uses: actions/upload-artifact@v4
        with:
          name: console-dist
          path: apps/console/dist/
          retention-days: 1

      - name: Upload invest dist
        uses: actions/upload-artifact@v4
        with:
          name: invest-dist
          path: apps/invest/dist/
          retention-days: 1

  deploy-web:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    name: Deploy Web to Cloudflare Pages
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=nai-web

  deploy-edu:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    name: Deploy Edu to Cloudflare Pages
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: edu-dist
          path: apps/edu/dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/edu
          command: pages deploy dist --project-name=nguyenai-edu

  deploy-console:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    name: Deploy Console to Cloudflare Pages
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: console-dist
          path: apps/console/dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/console
          command: pages deploy dist --project-name=nguyenai-console

  deploy-invest:
    # RE-ENABLED 2026-07-13: Legal entity resolved per INVESTOR_ACCESS_POLICY.md.
    # VIET CAN NEW CORP (US) = primary legal entity, owns IP, issues SAFE.
    # KASAN JSC (VN, MST 0315521422) = commercial representative, receives VND.
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    name: Deploy Invest to Cloudflare Pages
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: invest-dist
          path: apps/invest/dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/invest
          command: pages deploy dist --project-name=nai-invest

  deploy-api:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    name: Deploy API Worker
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @nai/api build

      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy
          # Secrets are set manually via `wrangler secret put` or Cloudflare dashboard.
          # Do NOT use the `secrets:` field here — it fails if GitHub secrets are unset.
          # Once all secrets are in GitHub, uncomment the block below to enable auto-sync.
          # secrets: |
          #   STRIPE_SECRET_KEY
          #   STRIPE_WEBHOOK_SECRET
          #   VNPAY_TMN_CODE
          #   VNPAY_HASH_SECRET
          #   MAIL_GATEWAY_API_KEY
          #   PAY_GATEWAY_API_KEY
          #   PAY_NAI_HMAC
        # env:
        #   STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        #   STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        #   VNPAY_TMN_CODE: ${{ secrets.VNPAY_TMN_CODE }}
        #   VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}

  deploy-auth:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production
    name: Deploy Auth Worker
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Auth
        run: pnpm --filter @nai/auth-worker build

      - name: Deploy Auth Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/auth
          command: deploy
          # Secrets are set manually via `wrangler secret put` or Cloudflare dashboard.
          # Do NOT use the `secrets:` field here — it fails if GitHub secrets are unset.
          # Once all secrets are in GitHub, uncomment the block below to enable auto-sync.
          # secrets: |
          #   GOOGLE_CLIENT_ID
          #   GOOGLE_CLIENT_SECRET
          #   MAIL_GATEWAY_API_KEY
        # env:
        #   GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        #   GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
