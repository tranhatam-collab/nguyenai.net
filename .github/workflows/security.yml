name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # P1-E.1 — SAST (semgrep) — fail on SAST finding
  # ============================================================
  sast:
    name: P1-E.1 SAST (semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install semgrep
        run: pip install semgrep

      - name: Run semgrep SAST scan
        run: |
          semgrep ci --config .semgrep.yml --json --output semgrep-results.json || EXIT=$?
          if [ "${EXIT:-0}" != "0" ]; then
            echo "::error::Semgrep found SAST findings — merge blocked"
            python3 -c "import json; d=json.load(open('semgrep-results.json')); print(f'Findings: {len(d.get(\"results\",[]))}')"
            exit 1
          fi
          echo "No SAST findings"

      - name: Upload semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30

  # ============================================================
  # P1-E.2 — Image/FS scan (trivy) — scan report
  # ============================================================
  trivy-fs:
    name: P1-E.2 Trivy FS scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-results.json
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Generate trivy summary
        run: |
          python3 -c "
          import json
          with open('trivy-fs-results.json') as f:
              d = json.load(f)
          vulns = d.get('Results', [])
          total = sum(len(r.get('Vulnerabilities', [])) for r in vulns)
          print(f'Total vulnerabilities (HIGH/CRITICAL): {total}')
          "

      - name: Upload trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.json
          retention-days: 30

  # ============================================================
  # P1-E.3 — Vuln scan (grype) — fail on critical vuln
  # ============================================================
  grype:
    name: P1-E.3 Grype vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (for lockfile scan)
        run: pnpm install --frozen-lockfile

      - name: Install grype and update vulnerability DB
        run: |
          curl -sSfL https://get.anchore.io/grype | sh -s -- -b /usr/local/bin
          grype db update

      - name: Run grype vulnerability scan
        run: |
          grype -o json --fail-on high --only-fixed dir:. > grype-results.json || GRYPE_EXIT=$?
          cat grype-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          matches = data.get('matches', [])
          if not matches:
            print('No fixed vulnerabilities found at HIGH/CRITICAL level')
            sys.exit(0)
          for m in matches:
            v = m.get('vulnerability', {})
            a = m.get('artifact', {})
            print(f\"{v.get('severity','?'):8} {v.get('id','?'):20} {a.get('name','?'):30} {a.get('version','?'):15} fix={v.get('fix',{}).get('versions','?')}\")
          sys.exit(1)
          " || exit \${GRYPE_EXIT:-0}

      - name: Check grype results for critical vulns
        run: |
          if [ ! -f grype-results.json ]; then
            echo "No grype results found — skipping critical check"
            exit 0
          fi
          CRITICAL=$(python3 -c "
          import json
          with open('grype-results.json') as f:
              d = json.load(f)
          criticals = [m for m in d.get('matches', []) if m.get('vulnerability', {}).get('severity', '').lower() == 'critical']
          print(len(criticals))
          " 2>/dev/null || echo "0")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities — merge blocked"
            exit 1
          fi
          echo "No critical vulnerabilities found"

      - name: Upload grype results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-results
          path: grype-results.json
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================
  # P1-E.4 — Secret scan (gitleaks) — fail on secret leak
  # ============================================================
  gitleaks:
    name: P1-E.4 Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_CONFIG: .gitleaks.toml

  # ============================================================
  # P1-E.5 — Artifact signing (cosign) — sign build artifacts
  # ============================================================
  cosign:
    name: P1-E.5 Artifact signing (cosign)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: pnpm build

      - name: Create build artifact
        run: |
          mkdir -p artifacts
          tar czf artifacts/nai-build.tar.gz \
            apps/web/dist \
            apps/console/dist \
            apps/invest/dist \
            apps/edu/dist \
            2>/dev/null || true
          sha256sum artifacts/nai-build.tar.gz > artifacts/nai-build.tar.gz.sha256
          cat artifacts/nai-build.tar.gz.sha256

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact with cosign (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature artifacts/nai-build.tar.gz.sig \
            --output-certificate artifacts/nai-build.tar.gz.crt \
            artifacts/nai-build.tar.gz
          echo "Artifact signed with cosign keyless signing"

      - name: Verify signature
        run: |
          # Keyless cosign: certificate identity = workflow ref, issuer = GitHub OIDC
          cosign verify-blob \
            --certificate-identity-regexp "https://github.com/.+/.github/workflows/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate artifacts/nai-build.tar.gz.crt \
            --signature artifacts/nai-build.tar.gz.sig \
            artifacts/nai-build.tar.gz
          echo "Signature verified"

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-build
          path: artifacts/
          retention-days: 7

  # ============================================================
  # P1-E.6 — Provenance (SLSA) — build provenance attestation
  # ============================================================
  slsa:
    name: P1-E.6 SLSA provenance
    runs-on: ubuntu-latest
    needs: cosign
    permissions:
      id-token: write
      packages: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Download signed build
        uses: actions/download-artifact@v4
        with:
          name: signed-build
          path: artifacts/

      - name: Generate SLSA provenance attestation
        run: |
          SHA=$(cat artifacts/nai-build.tar.gz.sha256 | cut -d' ' -f1)
          # cosign attest-blob --type slsaprovenance expects the PREDICATE only
          # (not the full in-toto Statement). The predicate must contain builder,
          # buildType, invocation, metadata, materials per SLSA v0.2 spec.
          cat > slsa-provenance.json <<'PROV'
          {
            "builder": { "id": "github-actions" },
            "buildType": "https://github.com/tranhatam-collab/nguyenai.net/.github/workflows/security.yml",
            "invocation": {
              "configSource": {
                "uri": "https://github.com/tranhatam-collab/nguyenai.net",
                "digest": { "sha1": "PLACEHOLDER_GITSHA" },
                "entryPoint": ".github/workflows/security.yml:slsa"
              }
            },
            "metadata": {
              "buildStartedOn": "2026-07-13T00:00:00Z",
              "completeness": { "parameters": true, "environment": true, "materials": true },
              "reproducible": false
            },
            "materials": [
              {
                "uri": "https://github.com/tranhatam-collab/nguyenai.net",
                "digest": { "sha1": "PLACEHOLDER_GITSHA" }
              }
            ]
          }
          PROV
          # Remove leading indentation from heredoc (cosign needs compact JSON)
          sed -i 's/^          //' slsa-provenance.json
          sed -i "s/PLACEHOLDER_GITSHA/${{ github.sha }}/g" slsa-provenance.json
          # Validate JSON + check builder field
          python3 -c "import json; d=json.load(open('slsa-provenance.json')); assert 'builder' in d, 'builder missing'; print('SLSA predicate valid, builder:', d['builder'])"
          echo "SLSA provenance generated"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Attest provenance with cosign
        run: |
          cosign attest-blob --yes \
            --predicate slsa-provenance.json \
            --type slsaprovenance \
            artifacts/nai-build.tar.gz
          echo "Provenance attested"

      - name: Upload provenance
        uses: actions/upload-artifact@v4
        with:
          name: slsa-provenance
          path: |
            slsa-provenance.json
          retention-days: 30
